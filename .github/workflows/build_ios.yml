name: "🚀 Build Hà Nhạy VIP (Pure Swift) — TrollStore TIPA"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid xcodegen

      - name: Generate Xcode Project
        working-directory: native
        run: xcodegen generate

      - name: Build iOS release
        working-directory: native
        run: |
          set -e
          set -o pipefail
          xcodebuild build \
            -project HaNhayVIP.xcodeproj \
            -scheme HaNhayVIP \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SYMROOT=$PWD/build \
            2>&1 | tee xcodebuild_log.txt || {
              echo "XCODEBUILD FAILED! Check log:"
              cat xcodebuild_log.txt
              exit 1
            }
          
          if [ ! -d "build/Release-iphoneos/HaNhayVIP.app" ]; then
            echo "BUILD FAILED! Check log:"
            tail -100 xcodebuild_log.txt
            exit 1
          fi
          echo "✅ Build done"

      - name: Sign & Package TIPA
        working-directory: native
        run: |
          set -e
          APP="build/Release-iphoneos/HaNhayVIP.app"
          ENT="Resources/entitlements.plist"

          mkdir -p Payload
          cp -r "$APP" Payload/

          echo "🔑 Ad-hoc sign all Mach-O binaries..."
          find Payload/HaNhayVIP.app -type f | while read -r f; do
            if file "$f" | grep -qE "Mach-O|dylib"; then
              codesign -s "-" -f "$f" 2>/dev/null || true
            fi
          done

          echo "📜 Apply TrollStore entitlements with ldid..."
          EXEC="Payload/HaNhayVIP.app/HaNhayVIP"
          
          if [ ! -f "$EXEC" ]; then
            echo "Cannot find executable in Payload"
            ls -la Payload/HaNhayVIP.app/
            exit 1
          fi
          
          if [ ! -f "$ENT" ]; then
            echo "Cannot find entitlements file: $ENT"
            exit 1
          fi
          
          echo "Signing $EXEC with $ENT"
          ldid -S"${ENT}" "$EXEC"

          echo "📦 Zip to TIPA..."
          zip -qr HaNhayVIP.tipa Payload

          echo "✅ Done! File size:"
          ls -lh HaNhayVIP.tipa

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: HaNhayVIP-PureSwift-TrollStore
          path: native/HaNhayVIP.tipa
          retention-days: 30
