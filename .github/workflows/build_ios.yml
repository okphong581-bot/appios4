name: Build TrollStore TIPA — Hà Nhạy VIP Overlay

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tipa:
    runs-on: macos-latest

    steps:
      # ─────────────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────
      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ─────────────────────────────────────────────────
      - name: Install ldid (TrollStore-style codesign)
        run: brew install ldid

      # ─────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ─────────────────────────────────────────────────
      # Inject DEVELOPMENT_TEAM using Python (safe — không dùng sed)
      # Chỉ chạy nếu chưa có DEVELOPMENT_TEAM trong file
      - name: Inject DEVELOPMENT_TEAM into project.pbxproj
        run: |
          python3 - <<'PYEOF'
          pbxproj = "ios/Runner.xcodeproj/project.pbxproj"
          with open(pbxproj, "r", encoding="utf-8") as f:
              content = f.read()

          if "DEVELOPMENT_TEAM = DUMMY;" not in content:
              content = content.replace(
                  "buildSettings = {",
                  "buildSettings = {\n\t\t\t\tDEVELOPMENT_TEAM = DUMMY;\n\t\t\t\tCODE_SIGN_STYLE = Manual;"
              )
              with open(pbxproj, "w", encoding="utf-8") as f:
                  f.write(content)
              print("✅ DEVELOPMENT_TEAM injected.")
          else:
              print("ℹ️ DEVELOPMENT_TEAM already present, skipped.")
          PYEOF

      # ─────────────────────────────────────────────────
      - name: Disable code signing in xcconfig
        run: |
          echo "CODE_SIGNING_ALLOWED = NO"  >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = "      >> ios/Flutter/Release.xcconfig

      # ─────────────────────────────────────────────────
      - name: Build iOS Release (no codesign)
        run: |
          flutter clean
          flutter build ios --release --no-codesign
          echo "✅ Flutter build hoàn thành"
          ls -lh build/ios/iphoneos/

      # ─────────────────────────────────────────────────
      - name: Sign with ldid + Package as TIPA
        run: |
          set -e

          APP_PATH="build/ios/iphoneos/Runner.app"
          ENTITLEMENTS="ios/Runner/Runner.entitlements"
          OUT_DIR="Payload"

          mkdir -p "$OUT_DIR"
          cp -r "$APP_PATH" "$OUT_DIR/"

          echo "📦 Ký toàn bộ Mach-O binary với ad-hoc codesign..."
          find "$OUT_DIR/Runner.app" -type f | while read -r file; do
            if file "$file" | grep -qE "Mach-O|dylib"; then
              codesign -s "-" -f "$file" 2>/dev/null && echo "  signed: $file" || true
            fi
          done

          echo "🔑 Áp dụng TrollStore entitlements với ldid..."
          ldid -S"${ENTITLEMENTS}" "$OUT_DIR/Runner.app/Runner"

          echo "📦 Đóng gói thành TIPA..."
          zip -qr HaNhayVIP.tipa "$OUT_DIR"

          echo ""
          echo "✅ Đóng gói thành công!"
          ls -lh HaNhayVIP.tipa

      # ─────────────────────────────────────────────────
      - name: Upload TIPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaNhayVIP-TrollStore
          path: HaNhayVIP.tipa
          retention-days: 30
