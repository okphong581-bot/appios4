name: Build TrollStore Overlay App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install ldid
        run: brew install ldid

      - name: Get Dependencies
        run: flutter pub get

      - name: Disable Code Signing & Build iOS App
        run: |
          # 1. Inject dummy DEVELOPMENT_TEAM to pass Flutter's validation
          # Flutter checks that DEVELOPMENT_TEAM is non-empty, but --no-codesign skips actual signing
          sed -i '' '/buildSettings = {/a\
                DEVELOPMENT_TEAM = DUMMY;\
                CODE_SIGN_STYLE = Manual;\
          ' ios/Runner.xcodeproj/project.pbxproj
          
          # 2. Override signing in xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> ios/Flutter/Release.xcconfig
          
          # 3. Build with Flutter (now passes validation because DEVELOPMENT_TEAM exists)
          flutter build ios --release --no-codesign

      - name: Inject Root Entitlements & Package
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          
          # Dùng file entitlements từ source code đã được cấu hình chuẩn (giữ container, thêm window-hosting)
          cp ios/Runner/Runner.entitlements entitlements.plist
          
          # QUAN TRỌNG: Quét và ký ad-hoc cho TẤT CẢ các file thực thi Mach-O (gồm Flutter.framework, App.framework, dylibs)
          # Điều này giải quyết triệt để lỗi "màn hình đen rồi văng" do thư viện động không được ký đúng cách
          find Payload/Runner.app -type f | while read file; do
            if file "$file" | grep -q "Mach-O"; then
              echo "Ký Mach-O: $file"
              codesign -s "-" -f "$file" || true
            fi
          done
          
          # Ký đè lên file thực thi chính bằng entitlements.plist
          codesign -s "-" -f --entitlements entitlements.plist Payload/Runner.app/Runner
          
          # Ký toàn bộ app bundle
          codesign -s "-" -f Payload/Runner.app
          
          # Tạo đồng thời 2 định dạng: .ipa và .tipa như yêu cầu
          zip -r appios4.ipa Payload
          cp appios4.ipa appios4.tipa
          
          echo "Kích thước các file đầu ra:"
          ls -lh appios4.ipa appios4.tipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appios4-IPA
          path: appios4.ipa

      - name: Upload TIPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appios4-TrollStore
          path: appios4.tipa
