name: Build TrollStore File Injector

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install ldid
        run: brew install ldid

      - name: Create Flutter App
        run: |
          rm -rf ios android lib test web macos linux windows pubspec.yaml
          flutter create .
          
          # Thêm thư viện chọn file
          flutter pub add file_picker
          
          # Viết giao diện và logic App Injector
          cat << 'EOF' > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:file_picker/file_picker.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'TrollStore File Injector',
                theme: ThemeData.dark(),
                home: const InjectorScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class InjectorScreen extends StatefulWidget {
            const InjectorScreen({super.key});

            @override
            State<InjectorScreen> createState() => _InjectorScreenState();
          }

          class _InjectorScreenState extends State<InjectorScreen> {
            String? selectedFilePath;
            final TextEditingController destController = TextEditingController();
            String statusMessage = "Sẵn sàng...";

            Future<void> pickFile() async {
              try {
                FilePickerResult? result = await FilePicker.pickFiles();
                if (result != null) {
                  setState(() {
                    selectedFilePath = result.files.single.path;
                    statusMessage = "Đã chọn file:\n$selectedFilePath";
                  });
                }
              } catch (e) {
                setState(() {
                  statusMessage = "Lỗi chọn file: $e";
                });
              }
            }

            Future<void> injectFile() async {
              if (selectedFilePath == null) {
                setState(() => statusMessage = "Vui lòng chọn file trước!");
                return;
              }
              String destPath = destController.text.trim();
              if (destPath.isEmpty) {
                setState(() => statusMessage = "Vui lòng nhập đường dẫn đích!");
                return;
              }

              setState(() => statusMessage = "Đang xử lý...");

              try {
                File sourceFile = File(selectedFilePath!);
                if (!await sourceFile.exists()) {
                  setState(() => statusMessage = "File nguồn không tồn tại!");
                  return;
                }

                File destFile = File(destPath);
                Directory destDir = destFile.parent;
                if (!await destDir.exists()) {
                  await destDir.create(recursive: true);
                }

                // Copy đè file
                await sourceFile.copy(destPath);
                
                setState(() {
                  statusMessage = "✅ INJECT THÀNH CÔNG!\nFile đã được chép vào:\n$destPath";
                });
              } catch (e) {
                setState(() {
                  statusMessage = "❌ THẤT BẠI!\nLỗi: $e\n\n(Đảm bảo cài bằng TrollStore để có quyền Root)";
                });
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('TrollStore Injector', style: TextStyle(color: Colors.green, fontWeight: FontWeight.bold)),
                  backgroundColor: Colors.grey[900],
                  centerTitle: true,
                ),
                backgroundColor: Colors.black,
                body: SingleChildScrollView(
                  padding: const EdgeInsets.all(20.0),
                  child: Column(
                    crossAxisAlignment: CrossAxisAlignment.stretch,
                    children: [
                      const Icon(Icons.drive_folder_upload, size: 80, color: Colors.blueAccent),
                      const SizedBox(height: 20),
                      ElevatedButton.icon(
                        icon: const Icon(Icons.upload_file),
                        label: const Text("1. TẢI FILE LÊN"),
                        style: ElevatedButton.styleFrom(
                          padding: const EdgeInsets.all(15),
                          backgroundColor: Colors.blue[800],
                          foregroundColor: Colors.white,
                        ),
                        onPressed: pickFile,
                      ),
                      const SizedBox(height: 10),
                      Text(
                        selectedFilePath != null ? "File đã chọn: ${selectedFilePath!.split('/').last}" : "Chưa chọn file",
                        style: const TextStyle(color: Colors.orange),
                        textAlign: TextAlign.center,
                      ),
                      const SizedBox(height: 30),
                      TextField(
                        controller: destController,
                        style: const TextStyle(color: Colors.white),
                        decoration: InputDecoration(
                          labelText: "2. Nhập đường dẫn đích muốn dán file",
                          hintText: "VD: /var/mobile/Containers/Data/Application/...",
                          hintStyle: const TextStyle(color: Colors.white30),
                          border: const OutlineInputBorder(),
                          filled: true,
                          fillColor: Colors.grey[850],
                        ),
                      ),
                      const SizedBox(height: 30),
                      ElevatedButton.icon(
                        icon: const Icon(Icons.flash_on),
                        label: const Text("3. INJECT (DÁN VÀO)", style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                        style: ElevatedButton.styleFrom(
                          backgroundColor: Colors.red[700],
                          foregroundColor: Colors.white,
                          padding: const EdgeInsets.all(20)
                        ),
                        onPressed: injectFile,
                      ),
                      const SizedBox(height: 30),
                      Container(
                        padding: const EdgeInsets.all(15),
                        decoration: BoxDecoration(
                          color: Colors.grey[900],
                          borderRadius: BorderRadius.circular(10),
                          border: Border.all(color: Colors.green, width: 2)
                        ),
                        child: Text(
                          statusMessage,
                          style: const TextStyle(color: Colors.white, fontSize: 14),
                          textAlign: TextAlign.center,
                        ),
                      )
                    ],
                  ),
                ),
              );
            }
          }
          EOF
          
          # Cấp quyền đọc file cho iOS Info.plist
          sed -i '' '/<dict>/a\
          <key>LSSupportsOpeningDocumentsInPlace</key>\
          <true/>\
          <key>UIFileSharingEnabled</key>\
          <true/>\
          <key>NSPhotoLibraryUsageDescription</key>\
          <string>Cần quyền để chọn file</string>\
          <key>NSAppleMusicUsageDescription</key>\
          <string>Cần quyền để chọn file âm thanh</string>\
          <key>NSDocumentsFolderUsageDescription</key>\
          <string>Cần quyền để lưu file</string>\
          ' ios/Runner/Info.plist

      - name: Disable Code Signing & Build iOS App
        run: |
          # 1. Inject dummy DEVELOPMENT_TEAM to pass Flutter's validation
          # Flutter checks that DEVELOPMENT_TEAM is non-empty, but --no-codesign skips actual signing
          sed -i '' '/buildSettings = {/a\
                DEVELOPMENT_TEAM = DUMMY;\
                CODE_SIGN_STYLE = Manual;\
          ' ios/Runner.xcodeproj/project.pbxproj
          
          # 2. Override signing in xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> ios/Flutter/Release.xcconfig
          
          # 3. Build with Flutter (now passes validation because DEVELOPMENT_TEAM exists)
          flutter build ios --release --no-codesign

      - name: Inject Root Entitlements & Package
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          
          # Cấp quyền No-Sandbox để ghi file vào hệ thống Root
          # Loại bỏ quyền disk-device-access vì Apple sẽ lập tức crash app nếu phát hiện
          cat << 'EOF' > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.private.security.no-sandbox</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # QUAN TRỌNG: Ký trắng (Ad-hoc Sign) TOÀN BỘ Frameworks để tránh lỗi màn hình trắng
          find Payload/Runner.app/Frameworks -type d -name "*.framework" -exec codesign -s "-" -f {} \; || true
          find Payload/Runner.app/Frameworks -type f -name "*.dylib" -exec codesign -s "-" -f {} \; || true
          
          # Dùng codesign để ép quyền vào App chính
          codesign -s "-" -f --entitlements entitlements.plist Payload/Runner.app/Runner || true
          codesign -s "-" -f Payload/Runner.app || true
          
          zip -r InjectorApp.ipa Payload
          echo "Kích thước file IPA:"
          ls -lh InjectorApp.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: InjectorApp-TrollStore
          path: InjectorApp.ipa
