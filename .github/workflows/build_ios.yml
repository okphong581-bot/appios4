name: Build TrollStore Overlay App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install ldid
        run: brew install ldid

      - name: Get Dependencies
        run: flutter pub get

      - name: Inject DEVELOPMENT_TEAM safely (Python)
        run: |
          python3 - <<'PYEOF'
          import re

          pbxproj = "ios/Runner.xcodeproj/project.pbxproj"
          with open(pbxproj, "r", encoding="utf-8") as f:
              content = f.read()

          # Only inject if not already present
          if "DEVELOPMENT_TEAM = DUMMY;" not in content:
              # Insert after each "buildSettings = {" line
              content = content.replace(
                  "buildSettings = {",
                  "buildSettings = {\n\t\t\t\tDEVELOPMENT_TEAM = DUMMY;\n\t\t\t\tCODE_SIGN_STYLE = Manual;"
              )

          with open(pbxproj, "w", encoding="utf-8") as f:
              f.write(content)

          print("DEVELOPMENT_TEAM injected successfully.")
          PYEOF

      - name: Disable Code Signing in xcconfig
        run: |
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> ios/Flutter/Release.xcconfig

      - name: Build iOS App (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Sign with ldid & Package as IPA + TIPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/

          ENTITLEMENTS="ios/Runner/Runner.entitlements"

          # Sign ALL Mach-O binaries inside the app with ad-hoc codesign first
          find Payload/Runner.app -type f | while read file; do
            if file "$file" | grep -qE "Mach-O|dylib"; then
              echo "Signing with codesign: $file"
              codesign -s "-" -f "$file" 2>/dev/null || true
            fi
          done

          # Override main executable with TrollStore entitlements using ldid
          ldid -S"${ENTITLEMENTS}" Payload/Runner.app/Runner
          echo "ldid entitlements applied successfully."

          # Re-sign entire bundle ad-hoc
          codesign -s "-" -f Payload/Runner.app

          # Package as both IPA and TIPA
          zip -r appios4.ipa Payload
          cp appios4.ipa appios4.tipa

          echo "Output file sizes:"
          ls -lh appios4.ipa appios4.tipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appios4-IPA
          path: appios4.ipa

      - name: Upload TIPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appios4-TrollStore
          path: appios4.tipa
