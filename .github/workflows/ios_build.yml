name: Build TrollStore Menu IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Create Flutter Project & Inject Native Code
        run: |
          # 1. Create base flutter project
          flutter create .
          
          # 2. Inject AppDelegate.swift with Floating Menu Code
          cat << 'EOF' > ios/Runner/AppDelegate.swift
          import UIKit
          import Flutter

          @UIApplicationMain
          @objc class AppDelegate: FlutterAppDelegate {
            
            var overlayWindow: UIWindow?

            override func application(
              _ application: UIApplication,
              didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
            ) -> Bool {
              GeneratedPluginRegistrant.register(with: self)
              
              // Đợi 3 giây để Flutter nạp xong giao diện mới gọi Menu Nổi
              DispatchQueue.main.asyncAfter(deadline: .now() + 3.0) {
                  self.setupFloatingMenu()
              }
              
              return super.application(application, didFinishLaunchingWithOptions: launchOptions)
            }
            
            func setupFloatingMenu() {
                if #available(iOS 13.0, *) {
                    // Cực kỳ quan trọng: Phải gắn UIWindow vào WindowScene trên iOS mới để chống Crash
                    guard let windowScene = UIApplication.shared.connectedScenes.first(where: { $0.activationState == .foregroundActive }) as? UIWindowScene else {
                        return
                    }
                    
                    let overlay = UIWindow(windowScene: windowScene)
                    overlay.windowLevel = UIWindow.Level.statusBar + 1000
                    overlay.backgroundColor = .clear
                    
                    let vc = UIViewController()
                    vc.view.backgroundColor = .clear
                    overlay.rootViewController = vc
                    
                    // Nút bấm tròn giả lập
                    let btn = UIButton(frame: CGRect(x: 20, y: 150, width: 60, height: 60))
                    btn.backgroundColor = .green
                    btn.layer.cornerRadius = 30
                    btn.layer.borderWidth = 2
                    btn.layer.borderColor = UIColor.white.cgColor
                    btn.setTitle("", for: .normal)
                    btn.setTitleColor(.black, for: .normal)
                    btn.titleLabel?.font = UIFont.boldSystemFont(ofSize: 30)
                    
                    let pan = UIPanGestureRecognizer(target: self, action: #selector(panGesture(_:)))
                    btn.addGestureRecognizer(pan)
                    
                    vc.view.addSubview(btn)
                    
                    // Hiển thị Window
                    overlay.makeKeyAndVisible()
                    self.overlayWindow = overlay
                }
            }
            
            @objc func panGesture(_ gesture: UIPanGestureRecognizer) {
                guard let window = self.overlayWindow else { return }
                let translation = gesture.translation(in: nil)
                window.center = CGPoint(x: window.center.x + translation.x, y: window.center.y + translation.y)
                gesture.setTranslation(.zero, in: nil)
            }
          }
          EOF
          
          # Remove audio hack from Info.plist to ensure standard App lifecycle
          cd ios/Runner
          # We don't strictly need audio background if they just want it to not crash on launch
          cd ../..
          
          # 3. Add UIBackgroundModes to Info.plist to keep app alive when exiting
          cd ios/Runner
          plutil -insert UIBackgroundModes -array Info.plist
          plutil -insert UIBackgroundModes.0 -string "audio" Info.plist
          cd ../..
          
      - name: Create TrollStore Entitlements
        run: |
          cat << 'EOF' > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.private.security.no-sandbox</key>
              <true/>
              <key>com.apple.springboard.accessibility-window-hosting</key>
              <true/>
              <key>com.apple.private.security.storage.AppDataContainers</key>
              <true/>
              <key>run-unsigned-code</key>
              <true/>
              <key>get-task-allow</key>
              <true/>
              <key>task_for_pid-allow</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS App (No Codesign)
        run: |
          cd ios
          # Disable codesign in Xcode
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' Runner.xcodeproj/project.pbxproj || true
          
          flutter build ios --release --no-codesign || true
          
          # Force build with Xcode directly to get the .app output
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER="" SYMROOT=$PWD/../build/ios > xcodebuild_log.txt 2>&1 || (tail -n 200 xcodebuild_log.txt && exit 1)

      - name: Inject Entitlements & Package IPA
        run: |
          # Install ldid to inject entitlements
          brew install ldid
          
          mkdir Payload
          # Copy the compiled .app
          cp -r build/ios/Release-iphoneos/Runner.app Payload/
          
          # Inject TrollStore Entitlements into the binary
          ldid -Sentitlements.plist Payload/Runner.app/Runner
          
          # Zip into .ipa format
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu-IPA
          path: app.ipa
