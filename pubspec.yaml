name: appios4
description: Hà Nhạy VIP — Floating Overlay App for TrollStore (TIPA)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Animations
  flutter_animate: ^4.5.0

  # Persistent storage — nhớ trạng thái overlay
  shared_preferences: ^2.3.2

  # Cupertino icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
